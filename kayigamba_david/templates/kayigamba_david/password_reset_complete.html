{% extends "kayigamba_david/base.html" %}
{% block title %}Password Updated{% endblock %}

{% block content %}
<style>
  .complete-icon-wrap {
    display: inline-flex; align-items: center; justify-content: center;
    width: 68px; height: 68px;
    background: linear-gradient(135deg, #059669 0%, #047857 100%);
    border-radius: 50%;
    box-shadow: 0 6px 20px rgba(5,150,105,.35);
    margin-bottom: 1.2rem;
    transition: transform .2s, box-shadow .2s;
    cursor: default;
  }
  .complete-icon-wrap:hover { transform: scale(1.06); box-shadow: 0 10px 28px rgba(5,150,105,.45); }

  .complete-card { transition: box-shadow .3s ease, transform .3s ease; }
  .complete-card:hover { box-shadow: 0 10px 36px rgba(5,150,105,.12); transform: translateY(-3px); }

  .btn-signin {
    position: relative; overflow: hidden;
    background: linear-gradient(90deg, #4f46e5 0%, #3730a3 100%);
    border: none; color: #fff;
  }
  .btn-signin::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.16), transparent);
    transition: left .5s;
  }
  .btn-signin:hover::before { left: 140%; }
  .btn-signin:hover { background: linear-gradient(90deg, #3730a3 0%, #4f46e5 100%); box-shadow: 0 6px 20px rgba(79,70,229,.40); }
</style>

<div class="auth-wrap">
  <div class="auth-card" style="max-width:440px;">

    <div style="text-align:center; margin-bottom:1.6rem;">
      <div class="complete-icon-wrap">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>
      <h1 class="page-title">Password updated</h1>
      <p class="page-subtitle">Your account is secure with its new password</p>
    </div>

    <div class="card complete-card">
      <div class="card__body" style="text-align:center;">
        <p style="font-size:.9rem; color:#4b5563; margin-bottom:1.4rem; line-height:1.6;">
          Your password has been changed successfully.
          You can now sign in with your new credentials.
        </p>
        <a href="{% url 'kayigamba_david:login' %}" class="btn btn-signin btn-full">
          Sign In &nbsp;&rarr;
        </a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
